  asm_ext:
    parent_pack_id: AMS-ASSUMPTIONS-V1
    assumption_text: 'Standard APPSolve AMS priority classification and response time targets: | Priority | Definition | Response
      Target | |---|---|---| | **P1 — Critical** | Complete system outage affecting all users; payroll processing blocked;
      financial period-end processing blocked; all integrations failed; data loss or corruption risk. System is unusable for
      core business functions. | **1 hour** | | **P2 — Major** | Major functionality impaired affecting a significant user
      population or a critical business process; key financial transactions cannot be processed; major integration failure
      affecting payment runs or bank reconciliation. Workaround exists but is severely limiting. | **4 business hours** |
      | **P3 — Normal** | Non-critical functionality impaired; a subset of users affected; workaround exists and is practical;
      non-urgent configuration question; report not working as expected. | **1 business day** | | **P4 — Minor** | Minor cosmetic
      issue; general how-to question; non-urgent service request; documentation request; low-impact configuration query. |
      **3 business days** | Response targets are uniform across Oracle, Acumatica, and BeBanking AMS. Response time is not
      resolution time (see AMS-SLA-001).'
    rationale: ''
    assumption_type: COMMERCIAL
    dependency: ''
    risk_exposure: ''
    pending: false
    sequence: 44
