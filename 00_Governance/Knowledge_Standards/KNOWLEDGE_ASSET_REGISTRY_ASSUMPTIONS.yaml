    assumption_text: 'During hypercare, APPSolve''s response to production issues operates on the following priority classification,
      applicable during standard South African business hours (08:00–17:00 SAST, Monday–Friday): - **P1 (Critical):** System
      unavailable or payroll/data integrity impacted — 2-hour response - **P2 (High):** Major function unavailable, no workaround
      — 4-hour response - **P3 (Medium):** Non-critical issue, workaround available — next business day response These SLAs
      are contractual during hypercare. Extended-hours or weekend support during hypercare requires explicit agreement in
      the SOW and is priced as an additional service.'
