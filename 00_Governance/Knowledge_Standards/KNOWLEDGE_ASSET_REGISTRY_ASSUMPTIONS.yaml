  asm_ext:
    parent_pack_id: OCI-ASSUMPTIONS-V1
    assumption_text: Post-migration performance validation is included as a standard migration deliverable. APPSolve validates
      that the migrated workload on OCI meets the documented performance baseline established from the pre-migration assessment.
      A pre-migration performance baseline must be established and agreed before migration execution begins; without a baseline,
      post-migration performance validation cannot be performed. OCI infrastructure performance issues identified within 30
      calendar days of client acceptance sign-off are treated as migration defects and remediated within the project scope.
      Performance issues identified after 30 days are treated as operational matters and handled under AMS or a new engagement.
      Application-level performance issues (slow queries, application code inefficiencies, integration bottlenecks) are excluded
      from the 30-day infrastructure performance warranty.
    rationale: ''
    assumption_type: COMMERCIAL
    dependency: ''
    risk_exposure: ''
    pending: false
