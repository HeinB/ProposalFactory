    assumption_text: Three-way match (PO / Goods Receipt Note / Invoice) is the APPSolve default for purchase-order-based
      supplier invoices where Oracle Procurement and Oracle Receiving are both in scope. Three-way match validates that the
      invoice quantity and amount match both the approved PO and the confirmed goods receipt before the invoice is approved
      for payment. Two-way match (PO / Invoice only, without a goods receipt) may be used only where Oracle Receiving is not
      in the BOM scope, or where the client explicitly confirms that their purchasing process does not use goods receipt confirmation.
      The matching approach is confirmed in the Scope and Design phase and documented in the AP configuration design.
