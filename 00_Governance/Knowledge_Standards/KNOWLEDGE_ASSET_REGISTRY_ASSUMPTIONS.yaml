  asm_ext:
    parent_pack_id: OIC-ASSUMPTIONS-V1
    assumption_text: One integration is defined as one directional data flow between one source system and one target system.
      An integration that sends data from System A to System B is one integration. An integration that returns data from System
      B to System A is a second, separate integration — two integrations must therefore be scoped, estimated, and priced where
      a bidirectional flow is required. This definition is the basis for APPSolve's integration count and estimate. Where
      the client uses the word "integration" to mean a business process spanning multiple flows, each directional flow within
      that process is counted and priced separately.
