      part of the same project as Oracle HCM or Oracle ERP, the single four-week hypercare period covers both the primary
      modules and the OIC integrations. The hypercare period commences on the go-live date of the last module or integration
      to go live in the project. Where OIC is delivered as a standalone project without a primary HCM or ERP module, hypercare
      commences on the date of the last integration go-live. OIC hypercare does not extend beyond the four-week default unless
      separately contracted.
