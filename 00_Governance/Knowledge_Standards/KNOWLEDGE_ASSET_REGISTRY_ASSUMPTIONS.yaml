    assumption_text: Oracle Fusion HCM and ERP receive quarterly platform updates from Oracle (typically January, April, July,
      October). Oracle manages the update schedule; APPSolve does not control Oracle's release cadence. APPSolve provides
      Oracle quarterly release advisory as a standard AMS service item — reviewing Oracle release notes for the client's contracted
      modules and flagging changes with potential impact on the client's configured processes. The advisory is a review and
      notification service. Regression testing, UAT execution, and business process validation following each Oracle quarterly
      update are excluded from standard AMS unless specifically contracted as a separately priced service. The customer remains
      responsible for business testing of their own processes before and after each quarterly update.
