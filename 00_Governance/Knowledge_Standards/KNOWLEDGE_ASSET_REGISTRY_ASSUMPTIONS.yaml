  asm_ext:
    parent_pack_id: OCI-ASSUMPTIONS-V1
    assumption_text: 'On-premise to OCI connectivity is implemented via IPSec VPN as the default for most client profiles.
      APPSolve recommends upgrading to FastConnect (dedicated circuit) when any of the following conditions apply: sustained
      bandwidth requirement exceeds 100 Mbps, the engagement has more than 100 concurrent users accessing OCI-hosted applications,
      the OIC or integration layer requires sub-second OCI-to-on-premise latency, or the DR design specifies an RTO of less
      than 2 hours. FastConnect requires a separate commercial engagement with a FastConnect partner and is separately priced
      in all cases.'
