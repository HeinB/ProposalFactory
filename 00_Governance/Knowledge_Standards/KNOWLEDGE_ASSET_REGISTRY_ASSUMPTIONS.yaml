      including Workplace Skills Plan (WSP) and Annual Training Report (ATR) submissions to the relevant SETA. APPSolve configures
      Oracle Learning to capture training activity at the required level of detail. The statutory submission itself is the
      client's responsibility. APPSolve provides guidance on the Oracle Fusion Learning OTBI subject areas available for WSP/ATR
      data extraction. No bespoke SETA-specific OTBI report template or Skills Development Act–specific BI Publisher report
      is delivered in base scope. The client's Learning Administrator is responsible for generating OTBI data and populating
      the applicable WSP/ATR template. APPSolve does not submit WSP/ATR reports to any SETA on the client's behalf.
