    assumption_text: Database High Availability for production Oracle VM DB Systems is implemented using Oracle Data Guard
      (primary + standby) as the standard default. Data Guard is included in all production VM DB System deployments unless
      the client provides written risk acceptance for single-instance production. Single-instance production deployments require
      explicit client sign-off acknowledging the absence of database HA and the implications for RTO/RPO. OCI cost estimates
      for production VM DB Systems must reflect the dual-node (primary + standby) sizing. Active Data Guard for read-scale-out
      scenarios is available where licensed and must be explicitly included in scope.
