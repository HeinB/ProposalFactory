      fails. Error notification emails are sent to: (1) the customer''s nominated integration support mailbox — configured
      at project outset and confirmed by the client during Scope and Design; and (2) APPSolve''s integration support mailbox
      during the hypercare period only. After hypercare, APPSolve''s mailbox is removed from the error notification configuration.
