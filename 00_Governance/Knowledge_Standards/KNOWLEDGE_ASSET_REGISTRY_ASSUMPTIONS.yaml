    assumption_text: 'A change request (CR) is a formally scoped and approved work item that constitutes new or changed scope
      beyond the standard service request catalogue. The standard CR threshold is 2 hours: changes estimated at more than
      2 hours of effort require a formal written CR, an effort estimate, and written client approval before work commences.
      APPSolve may, at its discretion, absorb changes estimated below 2 hours into the monthly support hours without raising
      a formal CR. No entitlement to this discretionary treatment is created by previous practice — each case is assessed
      independently. The CR threshold defined in a specific AMS agreement takes precedence over this standard.'
