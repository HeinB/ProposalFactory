  asm_ext:
    parent_pack_id: ACU-BASE-ASSUMPTIONS-V1
    assumption_text: Acumatica licences are procured by APPSolve as a Value-Added Reseller (VAR) or directly by the client.
      Unlike most ERP platforms, Acumatica's SaaS subscription is priced on a resource-consumption basis — not per named user
      or per concurrent user. The number of system users does not drive the licence cost; the allocated computing resource
      tier does. Unlimited users can be added to an Acumatica subscription without additional per-user licence fees; however,
      if resource consumption exceeds the subscribed tier, a tier upgrade is required. The appropriate resource tier is confirmed
      before implementation commences based on estimated transaction volumes and user activity levels. APPSolve cannot begin
      implementation configuration until the Acumatica licence is active in the client's tenant.
    rationale: ''
    assumption_type: COMMERCIAL
    dependency: ''
    risk_exposure: ''
    pending: false
    sequence: 3
