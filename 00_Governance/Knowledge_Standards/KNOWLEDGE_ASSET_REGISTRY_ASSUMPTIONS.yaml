    assumption_text: Oracle Database licensing for OCI DB Systems defaults to Bring Your Own License (BYOL). BYOL assumes
      the client holds current Oracle Database software licences that are eligible for use on OCI under Oracle's cloud licensing
      policies. The pre-sales discovery process must confirm the client's Oracle Database licence position before finalising
      OCI DB pricing. Where a client confirms they hold no Oracle Database licences (or licences insufficient for the required
      edition), License Included pricing is used. Proposing BYOL without confirming the client's licence position is not permitted.
