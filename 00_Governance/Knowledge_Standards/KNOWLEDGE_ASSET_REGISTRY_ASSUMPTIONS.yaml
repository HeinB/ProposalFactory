  asm_ext:
    parent_pack_id: OIC-ASSUMPTIONS-V1
    assumption_text: APPSolve classifies all OIC integrations using a three-tier complexity model for estimation. Every integration
      in the Integration Inventory is assigned a tier during Scope and Design; the tier is documented in the project estimate.
      - **Simple:** One source system, one target system. Standard Oracle adapter. Limited data transformation — direct field
      mapping with minimal lookups. No orchestration. Standard authentication (OAuth 2.0, Basic Auth). Small to medium payload.
      Well-documented vendor API with sandbox available. - **Standard:** One source system, one target system. Moderate data
      transformation — code-set lookups, conditional logic, data splitting or merging. Standard error handling and retry.
      One-to-one field mapping plus lookups. Typical payload. Reasonably documented vendor API. - **Complex:** Multi-step
      orchestration involving three or more systems, or multi-step processing within a single flow. Multiple business objects
      in a single integration. Complex transformations — calculations, aggregations, multi-level conditional branching. High-volume
      or near-real-time processing. Non-standard adapter. Custom or complex authentication — mTLS, JWT, custom token. No vendor
      sandbox available; production credentials only for testing. Integrations that do not clearly fit a single tier are assessed
      by the project lead and categorised with a documented rationale in the estimate.
    rationale: ''
    assumption_type: COMMERCIAL
    dependency: ''
    risk_exposure: ''
    pending: false
    sequence: 89
