    parent_pack_id: HCM-BASE-ASSUMPTIONS-V1
    assumption_text: A four (4) week hypercare period is the contractual default and commences immediately after the production
      go-live date. Hypercare is not a guideline — it is a standard delivery obligation. During hypercare, a senior APPSolve
      team is available during South African business hours (08:00–17:00 SAST, Monday–Friday) to respond to and resolve production
      defects and stabilisation issues. Hypercare scope is limited to defect resolution and system stabilisation. Enhancements,
      new functionality, new scope, and change requests are explicitly excluded from hypercare. Hypercare resource allocation
      is defined in the SOW.
