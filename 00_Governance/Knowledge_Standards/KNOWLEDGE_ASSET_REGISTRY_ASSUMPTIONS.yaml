    assumption_text: ERP parallel running is excluded by default. Parallel running — simultaneously operating the legacy ERP
      and Oracle Fusion ERP for a period after go-live, with transaction reconciliation between both systems — is not included
      in the base scope. A short controlled validation period (typically five to ten business days, limited to trial balance
      and opening balance verification only, not full operational parallel close) may be included where this is explicitly
      stated in the proposal scope section. Full parallel financial close cycles — completing a full month-end close in both
      legacy and Oracle ERP simultaneously — are excluded unless separately scoped and priced. The commercial and resource
      implications of any parallel activity must be agreed before the SOW is executed.
